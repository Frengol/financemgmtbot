name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  repo-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Audit backend dependencies
        run: |
          pip-audit -r requirements.txt
          pip-audit -r requirements-dev.txt

      - name: Run backend coverage
        run: |
          mkdir -p coverage/backend
          make test-backend-coverage | tee coverage/backend/summary.txt

      - name: Publish backend coverage summary
        run: cat coverage/backend/summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/backend/

  frontend-unit-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend runtime dependencies
        run: npm audit --omit=dev

      - name: Run frontend unit tests with coverage
        run: npm run test:coverage | tee coverage-summary.txt

      - name: Publish frontend coverage summary
        run: cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          test -n "$VITE_API_BASE_URL" || (echo "::error::Missing VITE_API_BASE_URL variable" && exit 1)
          npm run build

      - name: Verify built frontend contract
        run: npm run verify:bundle

      - name: Scan built frontend for sensitive strings
        run: |
          ! grep -R -n -E \
            'service_role|SUPABASE_KEY|APP_SESSION_SECRET|DATA_ENCRYPTION_KEY|TELEGRAM_BOT_TOKEN|TELEGRAM_SECRET_TOKEN|[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}|eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}' \
            dist

      - name: Upload frontend coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  frontend-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend smoke E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
